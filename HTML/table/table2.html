<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <h2>Table 2 in HTML</h2>
    <table border="1" cellpadding="20" width="400">
      <caption>
        table 2
      </caption>
      <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
      </tr>
      <tr>
        <td colspan="2">4</td>
        <td>5</td>
      </tr>
      <tr>
        <td rowspan="2">6</td>
        <td>7</td>
        <td rowspan="3">8</td>
      </tr>
      <tr>
        <td>9</td>
      </tr>
      <tr>
        <td colspan="2">10</td>
      </tr>
    </table>
    <br>
    <br>
    <table border="1" width="300" height="200">
      <tr>
        <td></td>
        <td></td>
        <td></td>
      </tr>
      <tr>
        <td colspan="2"></td>
        <td></td>
      </tr>
      <tr>
        <td rowspan="2"></td>
        <td></td>
        <td rowspan="3"></td>
      </tr>
      <tr>
        <td></td>
      </tr>
      <tr>
        <td colspan="2"></td>
      </tr>
    </table>
  </body>
</html>
