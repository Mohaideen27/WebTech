<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Table</title>
    <style>
      table {
        margin: auto;
      }
    </style>
  </head>
  <body>
    <marquee behavior="scroll" direction="left">
      <strong> 🌏 Exploring Travel Destination 🌏 </strong>
    </marquee>
    <table border="1" cellpadding="10">
      <tr>
        <th rowspan="2">Destination</th>
        <th colspan="2">Details</th>
        <th rowspan="2">Map</th>
      </tr>
      <tr>
        <th>Image</th>
        <th>Famous places</th>
      </tr>
      <tr>
        <td>Paris<em>(france)</em></td>
        <td><img src="image3.png" alt="" height="200" /></td>
        <td>
          <ol>
            <li>Effiel Tower</li>
            <li>Louvre Museum</li>
            <li>La Revue negre</li>
          </ol>
        </td>
        <td rowspan="3">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d59269410.008665934!2d-119.8093025!3d44.24236485!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x54eab584e432360b%3A0x1c3bb99243deb742!2sUnited%20States!5e1!3m2!1sen!2sin!4v1780473392984!5m2!1sen!2sin"
            width="600"
            height="800"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </td>
      </tr>
      <tr>
        <td>Tokyo<em>(japan)</em></td>
        <td><img src="image1.png" alt="" height="200" /></td>
        <td>
          <ol>
            <li>Todai Temple</li>
            <li>Kofuku Temple</li>
            <li>Gango Temple</li>
          </ol>
        </td>
      </tr>
      <tr>
        <td>New York<em>(usa)</em></td>
        <td><img src="image2.png" alt="" height="200" /></td>
        <td>
          <ol>
            <li>Statue of Liberty</li>
            <li>Summit One</li>
            <li>Empire State Building</li>
          </ol>
        </td>
      </tr>
    </table>
  </body>
</html>
