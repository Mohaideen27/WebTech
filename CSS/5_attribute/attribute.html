<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attribute Selector</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      header {
        margin: 20px;
        background-color: antiquewhite;
        height: 100px;
        border-radius: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      header > h1 {
        color: tomato;
        /* text-align: center; */
        text-transform: uppercase;
        letter-spacing: 2px;
        /* border: 1px solid white; */
        text-shadow: 2px 0px 3px gray;
      }
      main {
        margin: auto;
        padding: 30px;
        border-radius: 10px;
        width: 90vw;
        background-color: rgb(255, 125, 102);
        height: 50vh;
        box-shadow: 5px 5px 3px gray;
        display: flex;
        flex-direction: column;
        justify-content: start;
        align-items: center;
      }
      form {
        width: fit-content;
        padding: 20px;
        background-color: #fff;
        box-shadow: 5px 5px 3px gray;
        border-radius: 5px;
      }
      main > form > * {
        /* margin-top: 5px; */
        height: 25px;
        display: flex;
        justify-content: space-between;
        gap: 70px;
        /* border: 1px solid white; */
      }

      #btn {
        display: flex;
        margin-top: 10px;
        flex-direction: row;
        justify-content: space-around;
      }

      #btn > * {
        background-color: rgb(230, 230, 230);
        cursor: pointer;
        display: flex;
        align-items: center;
        border-color: transparent;
        border-radius: 8px;
        padding: 15px;
        color: rgb(35, 35, 35);
        font-weight: bold;
      }
      #btn > button[type="submit"]:hover {
        background-color: rgb(212, 231, 159);
      }
      #btn > button[type="reset"]:hover {
        background-color: rgb(230, 159, 159);
      }
      form > div > input {
        background-color: rgb(255, 249, 241);
        border: 1px solid rgb(183, 183, 183);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Attribute Selector</h1>
    </header>
    <main>
      <form action="">
        <div>
          <label for="name">Name</label>
          <input type="text" name="name" id="name" />
        </div>
        <br />
        <div>
          <label for="password">Password</label>
          <input type="password" name="password" id="password" />
        </div>
        <br />
        <div>
          <label for="sId">Student ID</label>
          <input type="text" name="sId" id="sId" />
        </div>
        <br />
        <div id="btn">
          <button type="submit">Register</button>
          <button type="reset">Reset</button>
        </div>
      </form>
    </main>
  </body>
</html>
